# HomeTracker Docker Compose
#
# Two modes:
#   1. Claude-only (no Ollama): set ANTHROPIC_API_KEY, run: docker compose up app cron
#   2. With Ollama (local AI):  set OLLAMA_URL, run: docker compose --profile ollama up
#
# Examples:
#   ANTHROPIC_API_KEY=sk-ant-... docker compose up app cron -d
#   docker compose --profile ollama up -d

services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/app/data/hometracker.db
      # AI: set ONE of these. If both set, Ollama is tried first.
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - ANTHROPIC_MODEL=claude-sonnet-4-20250514
      # - OLLAMA_URL=http://ollama:11434
      # - OLLAMA_MODEL=llama3
      #
      # Auth (optional)
      # - AUTH_USERS=sarah:mypass,john:mypass
      #
      # Geo provider (optional, default: osm)
      # - GEO_PROVIDER=google
      # - GOOGLE_MAPS_API_KEY=AIza...
      #
      # Cron protection (optional)
      # - CRON_SECRET=your-secret
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  # Ollama — only starts with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # After first start: docker exec -it <container> ollama pull llama3

  # Cron: Offr.io sync (30min) + PPR refresh (daily)
  cron:
    image: alpine:latest
    depends_on:
      - app
    entrypoint: /bin/sh
    command: >
      -c "
      echo '*/30 9-18 * * 1-5 wget -q -O- --post-data=\"\" http://app:3000/api/cron/offr-sync 2>/dev/null' > /etc/crontabs/root
      echo '0 2 * * * wget -q -O- --post-data=\"\" http://app:3000/api/cron/ppr-refresh 2>/dev/null' >> /etc/crontabs/root
      crond -f -l 8
      "
    restart: unless-stopped

volumes:
  app-data:
  ollama-data:
